<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML応用編 ~登録フォームを作ってみよう~</title>
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <section class="wrapper">
      <div class="inner">
        <div class="main-content">
          <h1 class="form-title">アカウント作成</h1>
          <div class="columns flex">
            <div class="column is-halfWidth">
              <a href="#" class="button is-fullWidth is-facebook">Facebookでスタート</a>
            </div>
            <div class="column is-halfWidth">
              <a href="#" class="button is-fullWidth is-google">Googleでスタート</a>
            </div>
          </div>
          <p class="sub-text">タイムラインへ投稿を行うことや、アカウント情報を伝えることはありません。</p>
          <div class="divided">
            <p class="account-title">アカウント情報</p>
          </div>
          <form class= "form-content" action="#" method="POST">
            <div class="row name-box flex">
              <div class="name is-halfWidth">
                <p class="label-text">名字
                  <span class="alert"> ※</span>
                </p>
                <input type="text" name="lastName" class="input-init input-area" required>
              </div>
              <div class="name is-halfWidth">
                <p class="label-text">名前
                  <span class="alert"> ※</span>
                </p>
                <input type="text" name="lastName" class="input-init input-area" required>
              </div>
            </div>
            <div class="row gender">
              <p class="label-text is-fullWidth">性別</p>
              <div class="gender-contents flex">
                <label class="gender-content">
                  <input type="radio" name="gender" value="man" class="gender-input">
                  <span>男性</span>
                </label>
                <label class="gender-content">
                  <input type="radio" name="gender" value="woman" class="gender-input">
                  <span>女性</span>
                </label>
                <label class="gender-content">
                  <input type="radio" name="gender" value="other" class="gender-input">
                  <span>その他</span>
                </label>
              </div>


            </div>
            <div class="row origin is-halfWidth">
              <p class="label-text">出身</p>
              <div class="select-area">
                <select name="origin" id="origin" class="input-init input-area origin-input">
                  <option value="tokyo">東京</option>
                  <option value="chiba">千葉</option>
                  <option value="saitama">埼玉</option>
                  <option value="kanagawa">神奈川</option>
                </select>
              </div>
            </div>
            <div class="row email">
              <p class="label-text">Eメール
                <span class="alert"> ※</span>
              </p>
              <input type="email" name="email" class="input-init input-area is-fullWidth" placeholder="ex) hoge@example.com" required>
            </div>
            <div class="row phoneNumber">
              <p class="label-text">電話番号</p>
              <input type="text" name="phoneNumber" class="input-init input-area is-fullWidth" placeholder="ex) 09012345678">
            </div>
            <div class="row password">
              <p class="label-text">パスワード
                <span class="alert"> ※</span>
              </p>
              <input type="password" name="password" class="input-init input-area is-fullWidth" required>
            </div>
            <div class="row password">
              <p class="label-text">パスワード(確認用)
                <span class="alert"> ※</span>
              </p>
              <input type="password" name="password" class="input-init input-area is-fullWidth" required>
            </div>
            <div class="row course">
              <p class="label-text">希望コース</p>
              <ul class="course-options">
                <li class="course-option">
                  <input type="checkbox" name="course" value= "frontend" id="frontend">
                  <label for="frontend" class="course-option-text">フロントエンド</label>
                </li>
                <li class="course-option">
                  <input type="checkbox" name="course" value= "backend" id="backend">
                  <label for="backend" class="course-option-text">バックエンド</label>                    
                </li>                
                <li class="course-option">
                  <input type="checkbox" name="course" value= "app" id="app">
                  <label for="app" class="course-option-text">アプリ</label>                   
                </li>                
              </ul>
            </div>
            <div class="row remarks">
              <p class="label-text">備考</p> 
              <textarea type="text" name="remarks" class="input-init input-area is-fullWidth" placeholder="何かあればご記入ください"></textarea>
            </div>
            <div class="row">
              <input type="submit" value="アカウント作成" class="input-init button submit-button is-fullWidth">                 
            </div>  
            <p class="agreement">アカウントを作成することにより、<a href="#" class="link-color">利用規約</a>と<a href="#" class="link-color">プライバシーポリシー</a>に同意するものとします。</p>
          </form>
  
        </div>
        <div class="footer-part">
          <p>すでにアカウントをお持ちですか？ 
            <a href="#" class="link-color">ログイン</a>
          </p>
          <a href="#" class="link-color resend-mail">認証メールが届きませんか？</a>
        </div>
      </div>           
    </section>
  </body>
</html>
